<div class="table-responsive">
  <table class="table table-striped align-middle">
    <caption class="visually-hidden">
      {{ caption() }}
    </caption>
    <thead>
      <tr>
        @for (c of columns(); track c.key) {
          <th scope="col">{{ c.label }}</th>
        }
      </tr>
    </thead>
    <tbody>
      <ng-content />
    </tbody>
  </table>
</div>
