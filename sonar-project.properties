# SonarQube / SonarCloud — configure SONAR_TOKEN and host in CI
sonar.projectKey=library-management-platform
sonar.projectName=Library Management Platform
sonar.sourceEncoding=UTF-8

sonar.sources=backend/src,frontend/src
sonar.tests=backend/src,frontend/src
sonar.test.inclusions=**/*.spec.ts,**/*.cy.ts
sonar.exclusions=**/node_modules/**,**/dist/**,**/coverage/**,**/cypress/videos/**,**/cypress/screenshots/**

sonar.javascript.lcov.reportPaths=backend/coverage/lcov.info,frontend/coverage/jest/lcov.info
sonar.typescript.tsconfigPath=frontend/tsconfig.json
